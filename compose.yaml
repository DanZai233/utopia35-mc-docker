services:
  minecraft:
    image: ${IMAGE_NAME:-utopia35-mc-server}:${IMAGE_TAG:-local}
    build:
      context: .
      args:
        SERVER_PACK_URL: ${SERVER_PACK_URL:-}
        ALLOW_EMPTY_PACK: ${ALLOW_EMPTY_PACK:-false}
    container_name: ${CONTAINER_NAME:-utopia35-mc}
    restart: ${RESTART_POLICY:-unless-stopped}
    stdin_open: true
    tty: true
    stop_grace_period: ${STOP_GRACE_PERIOD:-2m}
    ports:
      - "${HOST_PORT:-25565}:${SERVER_PORT:-25565}/tcp"
      - "${RCON_HOST_PORT:-25575}:${RCON_PORT:-25575}/tcp"
      - "${BLUEMAP_HOST_PORT:-8100}:${BLUEMAP_PORT:-8100}/tcp"
    environment:
      EULA: ${EULA:-false}
      SERVER_JAR: ${SERVER_JAR:-server.jar}
      MIN_MEMORY: ${MIN_MEMORY:-4096M}
      MAX_MEMORY: ${MAX_MEMORY:-4096M}
      USE_AIKAR_FLAGS: ${USE_AIKAR_FLAGS:-true}
      JVM_OPTS: ${JVM_OPTS:-}
      CUSTOM_JVM_ARGS: ${CUSTOM_JVM_ARGS:-}
      CUSTOM_ARGS: ${CUSTOM_ARGS:-}
      ENABLE_GUI: ${ENABLE_GUI:-false}
      SERVER_PORT: ${SERVER_PORT:-25565}
      RCON_PORT: ${RCON_PORT:-25575}
      MOTD: ${MOTD:-Utopia 3.5 Fabric Server}
      LEVEL_NAME: ${LEVEL_NAME:-world}
      LEVEL_SEED: ${LEVEL_SEED:-}
      GAMEMODE: ${GAMEMODE:-survival}
      DIFFICULTY: ${DIFFICULTY:-normal}
      MAX_PLAYERS: ${MAX_PLAYERS:-20}
      ONLINE_MODE: ${ONLINE_MODE:-false}
      PVP: ${PVP:-true}
      ALLOW_FLIGHT: ${ALLOW_FLIGHT:-true}
      VIEW_DISTANCE: ${VIEW_DISTANCE:-10}
      SIMULATION_DISTANCE: ${SIMULATION_DISTANCE:-10}
      ENABLE_WHITELIST: ${ENABLE_WHITELIST:-false}
      ENFORCE_WHITELIST: ${ENFORCE_WHITELIST:-false}
      ENABLE_COMMAND_BLOCK: ${ENABLE_COMMAND_BLOCK:-false}
      SPAWN_PROTECTION: ${SPAWN_PROTECTION:-16}
      MAX_TICK_TIME: ${MAX_TICK_TIME:-60000}
      ENABLE_RCON: ${ENABLE_RCON:-false}
      RCON_PASSWORD: ${RCON_PASSWORD:-}
      SERVER_PROPERTIES: ${SERVER_PROPERTIES:-}
      ENV_CONFIG_FILE: ${ENV_CONFIG_FILE:-/data/server.env}
      BLUEMAP_PORT: ${BLUEMAP_PORT:-8100}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/${SERVER_PORT:-25565}'"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 2m

  panel:
    profiles: ["panel"]
    image: ${PANEL_IMAGE_NAME:-utopia35-mc-panel}:${PANEL_IMAGE_TAG:-local}
    build:
      context: ./panel
    container_name: ${PANEL_CONTAINER_NAME:-utopia35-panel}
    restart: ${PANEL_RESTART_POLICY:-unless-stopped}
    ports:
      - "${PANEL_BIND:-127.0.0.1}:${PANEL_HOST_PORT:-8080}:8080/tcp"
    environment:
      PANEL_PORT: 8080
      PANEL_BIND: ${PANEL_BIND:-127.0.0.1}
      PANEL_PASSWORD: ${PANEL_PASSWORD:-change-me}
      MINECRAFT_CONTAINER: ${CONTAINER_NAME:-utopia35-mc}
      DATA_DIR: /data
      WORKSPACE_DIR: /workspace
      COMPOSE_ENV_FILE: /workspace/.env
      RUNTIME_ENV_FILE: /data/server.env
      BACKUP_DIR: /workspace/backups
      RCON_HOST: ${PANEL_RCON_HOST:-minecraft}
      RCON_PORT: ${RCON_PORT:-25575}
      BLUEMAP_PORT: ${BLUEMAP_PORT:-8100}
      BLUEMAP_HOST_PORT: ${BLUEMAP_HOST_PORT:-8100}
      BLUEMAP_PUBLIC_URL: ${BLUEMAP_PUBLIC_URL:-}
      BLUEMAP_INTERNAL_URL: ${BLUEMAP_INTERNAL_URL:-http://minecraft:8100}
      PLAYER_AUTO_WHITELIST: ${PLAYER_AUTO_WHITELIST:-false}
      REMOTE_BACKUP_ENABLED: ${REMOTE_BACKUP_ENABLED:-false}
      REMOTE_BACKUP_ENDPOINT: ${REMOTE_BACKUP_ENDPOINT:-}
      REMOTE_BACKUP_REGION: ${REMOTE_BACKUP_REGION:-us-east-1}
      REMOTE_BACKUP_BUCKET: ${REMOTE_BACKUP_BUCKET:-}
      REMOTE_BACKUP_PREFIX: ${REMOTE_BACKUP_PREFIX:-utopia35}
      REMOTE_BACKUP_ACCESS_KEY_ID: ${REMOTE_BACKUP_ACCESS_KEY_ID:-}
      REMOTE_BACKUP_SECRET_ACCESS_KEY: ${REMOTE_BACKUP_SECRET_ACCESS_KEY:-}
      REMOTE_BACKUP_FORCE_PATH_STYLE: ${REMOTE_BACKUP_FORCE_PATH_STYLE:-true}
      REMOTE_BACKUP_AUTO_UPLOAD: ${REMOTE_BACKUP_AUTO_UPLOAD:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - ./data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s
